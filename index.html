<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💕 Romantic Games for My Love 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, sans-serif;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Floating hearts background */
    body::before {
      content: "❤️💖💕💗💓💘💝";
      position: fixed;
      font-size: 35px;
      white-space: nowrap;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.15;
      animation: floatHearts 25s linear infinite;
      z-index: 0;
    }

    @keyframes floatHearts {
      0% { transform: translateY(0%) rotate(0deg); }
      100% { transform: translateY(-100%) rotate(15deg); }
    }

    /* Game selector tabs */
    .game-tabs {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      z-index: 2;
      position: relative;
    }

    .tab-btn {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: none;
      padding: 12px 28px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      color: #a13e4a;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      font-family: inherit;
    }

    .tab-btn.active {
      background: #ff6b6b;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    }

    .tab-btn:hover {
      transform: translateY(-3px);
    }

    /* Main container */
    .game-container {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 64px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
      transition: all 0.4s ease;
      z-index: 2;
      position: relative;
      min-height: 550px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c31432, #ff6a88);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
    }

    .sub {
      color: #b45c6b;
      font-weight: 500;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    /* Game 1 Styles (Romantic Q&A) */
    .question-card {
      background: white;
      border-radius: 48px;
      padding: 2rem 1.5rem;
      margin: 1rem 0;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
    }

    .question-text {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2d1b2e;
      line-height: 1.3;
      margin-bottom: 1.8rem;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .btn {
      font-size: 1.6rem;
      font-weight: bold;
      padding: 12px 32px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      box-shadow: 0 5px 0 #b0a09c;
    }

    .btn-yes {
      background: #ff6b6b;
      color: white;
      box-shadow: 0 5px 0 #a13e3e;
    }

    .btn-yes:hover {
      background: #ff5252;
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #a13e3e;
    }

    .btn-no {
      background: #cdd1d9;
      color: #3a2c2f;
      box-shadow: 0 5px 0 #8e8e8e;
    }

    .progress-area {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #ac4e5e;
    }

    .progress-bar-bg {
      background: #ffe0e0;
      border-radius: 30px;
      height: 8px;
      width: 100%;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: #ff5e7c;
      width: 0%;
      height: 100%;
      transition: width 0.3s ease;
    }

    /* Game 2 Styles (Do You Love Me - NO button runs) */
    .love-game-box {
      padding: 20px;
    }

    .big-love-question {
      font-size: 2.5rem;
      font-weight: bold;
      color: #c23b4b;
      margin: 30px 0;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .love-buttons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 40px 0;
      flex-wrap: wrap;
      position: relative;
      min-height: 120px;
    }

    .love-btn {
      font-size: 2rem;
      padding: 15px 40px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: bold;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .love-yes {
      background: #ff6b6b;
      color: white;
      position: relative;
    }

    .love-yes:hover {
      transform: scale(1.08);
      background: #ff5252;
    }

    .love-no {
      background: #9e9e9e;
      color: white;
      position: relative;
      transition: all 0.1s ease;
    }

    .love-no:hover {
      cursor: pointer;
    }

    .love-message {
      background: linear-gradient(135deg, #fff5f5, #ffe0e7);
      border-radius: 40px;
      padding: 25px;
      margin-top: 30px;
      font-size: 1.3rem;
      border-left: 8px solid #ff496e;
      animation: fadeIn 0.6s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .restart-btn {
      background: #3c2a2f;
      color: #ffe3e3;
      font-size: 1rem;
      padding: 10px 24px;
      border: none;
      border-radius: 40px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .restart-btn:hover {
      background: #5e3a42;
    }

    footer {
      margin-top: 25px;
      font-size: 0.75rem;
      color: #b45c6b;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 550px) {
      .game-container { padding: 1.2rem; }
      .question-text { font-size: 1.3rem; }
      .btn { font-size: 1.2rem; padding: 8px 20px; }
      .love-btn { font-size: 1.5rem; padding: 10px 25px; }
      .big-love-question { font-size: 1.8rem; }
      .tab-btn { padding: 8px 18px; font-size: 1rem; }
    }
  </style>
</head>
<body>

<div style="max-width: 800px; margin: 0 auto;">
  <div class="game-tabs">
    <button class="tab-btn active" id="tabGame1">💕 Romantic Q&A Game</button>
    <button class="tab-btn" id="tabGame2">💘 Do You Love Me? 💘</button>
  </div>

  <div class="game-container">
    <!-- Game 1: Romantic Yes/No Questions -->
    <div id="game1Content">
      <h1>✨ LOVE QUEST ✨</h1>
      <div class="sub">💌 answer with your heart 💌</div>
      <div id="game1UI"></div>
    </div>

    <!-- Game 2: Do You Love Me? (NO button runs away) -->
    <div id="game2Content" class="hidden">
      <h1>💗 DO YOU LOVE ME? 💗</h1>
      <div class="sub">🎀 there's only one right answer... 🎀</div>
      <div id="game2UI"></div>
    </div>
    <footer>❤️ made with infinite love for you ❤️</footer>
  </div>
</div>

<script>
  // ==================== GAME 1: Romantic Questions ====================
  const questions = [
    { text: "Do you believe in love at first sight?", emoji: "✨😍" },
    { text: "Do I make your heart beat faster every time I text you?", emoji: "💓📱" },
    { text: "Is hugging me your favorite feeling in the world?", emoji: "🤗💕" },
    { text: "Do you smile when you see my name pop up?", emoji: "😊📲" },
    { text: "Would you cross oceans to be with me?", emoji: "🌊❤️" },
    { text: "Do you believe we are soulmates?", emoji: "🔗💫" },
    { text: "Are you ready for the final surprise?", emoji: "🎁💖" }
  ];

  const finalMessages = {
    perfect: {
      title: "💞 YES! A THOUSAND TIMES YES! 💞",
      message: "You said YES to everything, and my heart is exploding with joy! 🌟 You are my everything, my dream, my forever. Even though miles may separate us, our souls are dancing in the same rhythm. I love you more than words can ever express.",
      gift: "🎁✨ SURPRISE! ✨🎁\nA romantic virtual date night is waiting — and something special is coming your way! 🤫❤️"
    },
    good: {
      title: "💖 My Heart Belongs to You 💖",
      message: "You lit up my world with your sweet answers. Every YES is a reminder of how magical 'us' really is. Long distance is just a test, and we are passing with flying colors!",
      gift: "🎁 A little surprise: I've made a private playlist of 'our songs' just for you! 📝💿"
    },
    sweet: {
      title: "🌹 You & Me, A Beautiful Story 🌹",
      message: "Your love shines brighter than stars. Our journey is unique, full of laughter, understanding, and warmth. I adore every piece of you!",
      gift: "🎁 Surprise: I'll send you a voice note every morning this week to wake you with love! 🎧💕"
    },
    always: {
      title: "💗 My Love for You is Infinite 💗",
      message: "Every answer, every moment — I treasure it all. Thank you for playing, for being you. This game is just a tiny glimpse of how much I adore you.",
      gift: "🎁 Secret unlocked: I'll be ordering your favorite treat delivered to you — keep an eye out! 🍫🍕"
    }
  };

  let currentIndex = 0;
  let totalYesCount = 0;
  let game1Finished = false;

  function getFinalCategory(yesTotal, totalQuestions) {
    if (yesTotal === totalQuestions) return "perfect";
    if (yesTotal >= totalQuestions - 2 && yesTotal > 2) return "good";
    if (yesTotal >= 1) return "sweet";
    return "always";
  }

  function renderGame1() {
    const container = document.getElementById("game1UI");
    if (game1Finished) {
      const categoryKey = getFinalCategory(totalYesCount, questions.length);
      const final = finalMessages[categoryKey];
      triggerMiniConfetti();
      container.innerHTML = `
        <div class="finale-box">
          <h2 style="color:#c23b4b; margin: 0.5rem 0;">${final.title}</h2>
          <div class="romantic-message" style="background:#fff0f0; border-radius:40px; padding:1.2rem;">
            <p>✨ ${final.message} ✨</p>
            <p style="margin-top: 12px; font-weight: bold; background:#ffd9df; border-radius: 30px; padding: 8px;">${final.gift}</p>
          </div>
          <div style="background: #ffe6ea; border-radius: 60px; padding: 12px; margin: 10px 0;">
            🥰 Your YES count: ${totalYesCount} out of ${questions.length} 🥰
          </div>
          <button class="restart-btn" id="restartGame1Btn">⟳ Play Again ⟳</button>
        </div>
      `;
      document.getElementById("restartGame1Btn")?.addEventListener("click", () => {
        resetGame1();
        renderGame1();
      });
      return;
    }

    const q = questions[currentIndex];
    const progressPercent = ((currentIndex) / questions.length) * 100;
    container.innerHTML = `
      <div class="question-card">
        <div class="question-text">
          <span>${q.emoji}</span> ${q.text}
        </div>
        <div class="button-group">
          <button class="btn btn-yes" id="yesBtn1">✅ YES 💖</button>
          <button class="btn btn-no" id="noBtn1">❌ NO</button>
        </div>
      </div>
      <div class="progress-area">
        <span>❤️ Question ${currentIndex+1} of ${questions.length} ❤️</span>
        <div class="progress-bar-bg">
          <div class="progress-fill" style="width: ${progressPercent}%;"></div>
        </div>
        <div>✨ Yes answers: ${totalYesCount} ✨</div>
      </div>
    `;
    document.getElementById("yesBtn1")?.addEventListener("click", () => handleAnswer(true));
    document.getElementById("noBtn1")?.addEventListener("click", () => handleAnswer(false));
  }

  function handleAnswer(isYes) {
    if (game1Finished) return;
    if (isYes) totalYesCount++;
    if (currentIndex + 1 < questions.length) {
      currentIndex++;
      renderGame1();
    } else {
      game1Finished = true;
      renderGame1();
    }
  }

  function resetGame1() {
    currentIndex = 0;
    totalYesCount = 0;
    game1Finished = false;
  }

  // ==================== GAME 2: DO YOU LOVE ME? (NO button runs away) ====================
  let loveMessageShown = false;
  let noButtonAttempts = 0;

  function renderGame2() {
    const container = document.getElementById("game2UI");
    if (loveMessageShown) {
      container.innerHTML = `
        <div class="love-message">
          <div style="font-size: 3rem;">💖💖💖</div>
          <h2 style="color:#c31432; margin: 15px 0;">YOU SAID YES! 🎉</h2>
          <p style="font-size: 1.2rem;">My heart just exploded with happiness! I love you more than anything in this universe and beyond! 🌌💕</p>
          <p style="margin-top: 15px; font-weight: bold;">You're the best thing that ever happened to me. Forever and always, my love! 💍✨</p>
          <div style="margin-top: 20px;">
            <button class="restart-btn" id="resetLoveGame">💝 Play Again 💝</button>
          </div>
        </div>
      `;
      document.getElementById("resetLoveGame")?.addEventListener("click", () => {
        loveMessageShown = false;
        noButtonAttempts = 0;
        renderGame2();
      });
      return;
    }

    // Main love game UI with moving NO button
    container.innerHTML = `
      <div class="love-game-box">
        <div class="big-love-question">
          💕 DO YOU LOVE ME? 💕
        </div>
        <div class="love-buttons" id="loveButtonsArea">
          <button class="love-btn love-yes" id="loveYesBtn">YES 💖</button>
          <button class="love-btn love-no" id="loveNoBtn">NO 😢</button>
        </div>
        <div id="loveHint" style="font-size: 0.9rem; color: #b45c6b; margin-top: 15px;">
          💋 (spoiler: the NO button might be a little shy...) 💋
        </div>
      </div>
    `;

    const yesBtn = document.getElementById("loveYesBtn");
    const noBtn = document.getElementById("loveNoBtn");
    const buttonsArea = document.getElementById("loveButtonsArea");

    // YES button action
    yesBtn.addEventListener("click", () => {
      triggerMiniConfetti();
      loveMessageShown = true;
      renderGame2();
    });

    // NO button magic: runs away, dodges cursor, becomes unclickable
    let moveCount = 0;
    const maxMoves = 8;

    function moveNoButton() {
      if (!noBtn || loveMessageShown) return;
      moveCount++;
      
      // Get container boundaries
      const areaRect = buttonsArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const maxX = areaRect.width - btnRect.width - 10;
      const maxY = areaRect.height - btnRect.height - 10;
      
      let newX = Math.random() * maxX;
      let newY = Math.random() * maxY;
      
      noBtn.style.position = "relative";
      noBtn.style.left = `${newX}px`;
      noBtn.style.top = `${newY}px`;
      
      // Change text to be playful
      const noTexts = ["NO? 🥺", "sure? 💔", "can't!", "❤️", "try me!", "never~ 💕", "YES only 💘", "come on! 💗"];
      if (moveCount < noTexts.length) {
        noBtn.textContent = noTexts[moveCount];
      } else {
        noBtn.textContent = "💖 JUST YES 💖";
      }
      
      // After several moves, make it disappear temporarily
      if (moveCount >= maxMoves) {
        noBtn.style.opacity = "0";
        noBtn.style.pointerEvents = "none";
        const hint = document.getElementById("loveHint");
        if (hint) hint.innerHTML = "💕 See? There's no way to say NO... because you love me! Now click YES! 💕";
        setTimeout(() => {
          if (noBtn && !loveMessageShown) {
            noBtn.style.opacity = "0.3";
            noBtn.textContent = "💗 ONLY YES 💗";
          }
        }, 500);
      } else {
        // Shrink slightly each time
        let currentScale = 1 - (moveCount * 0.03);
        if (currentScale < 0.7) currentScale = 0.7;
        noBtn.style.transform = `scale(${currentScale})`;
      }
    }

    // Attach hover & click evasion
    if (noBtn) {
      noBtn.addEventListener("mouseenter", moveNoButton);
      noBtn.addEventListener("click", (e) => {
        e.preventDefault();
        moveNoButton();
        // Additional funny alert if clicked
        const messages = ["Nice try! 😘", "You can't say NO! 💕", "I know you love me! 💗", "Just say YES already! 🥰"];
        const hintDiv = document.getElementById("loveHint");
        if (hintDiv) {
          hintDiv.innerHTML = `✨ ${messages[Math.floor(Math.random() * messages.length)]} ✨`;
          setTimeout(() => {
            if (hintDiv && !loveMessageShown) hintDiv.innerHTML = "💋 (the NO button really wants you to click YES!) 💋";
          }, 1200);
        }
        moveNoButton();
        return false;
      });
    }
  }

  // ==================== Confetti Helper ====================
  function triggerMiniConfetti() {
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '9999';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    for(let i = 0; i < 100; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 7 + 3,
        color: `hsl(${Math.random() * 60 + 340}, 80%, 65%)`,
        vy: Math.random() * 3 + 1,
        vx: (Math.random() - 0.5) * 2
      });
    }
    let anim;
    function draw() {
      if(!canvas.parentNode) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let active = false;
      for(let p of particles) {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        p.y += p.vy;
        p.x += p.vx;
        if(p.y < canvas.height + 100) active = true;
      }
      if(active) requestAnimationFrame(draw);
      else canvas.remove();
    }
    draw();
    setTimeout(() => { if(canvas.parentNode) canvas.remove(); }, 2500);
  }

  // ==================== Tab Switching ====================
  function switchToGame1() {
    document.getElementById("game1Content").classList.remove("hidden");
    document.getElementById("game2Content").classList.add("hidden");
    document.getElementById("tabGame1").classList.add("active");
    document.getElementById("tabGame2").classList.remove("active");
    renderGame1(); // refresh in case reset needed
  }

  function switchToGame2() {
    document.getElementById("game1Content").classList.add("hidden");
    document.getElementById("game2Content").classList.remove("hidden");
    document.getElementById("tabGame2").classList.add("active");
    document.getElementById("tabGame1").classList.remove("active");
    renderGame2();
  }

  document.getElementById("tabGame1").addEventListener("click", switchToGame1);
  document.getElementById("tabGame2").addEventListener("click", switchToGame2);

  // Floating hearts on click anywhere
  document.body.addEventListener('click', function(e) {
    if(e.target.closest('.btn') || e.target.closest('.love-btn')) return;
    const heart = document.createElement('div');
    heart.innerHTML = '❤️';
    heart.style.position = 'absolute';
    heart.style.left = e.pageX + 'px';
    heart.style.top = e.pageY + 'px';
    heart.style.fontSize = '24px';
    heart.style.pointerEvents = 'none';
    heart.style.zIndex = '9998';
    heart.style.opacity = '0.9';
    heart.style.transition = 'transform 0.6s ease-out, opacity 0.6s';
    document.body.appendChild(heart);
    setTimeout(() => {
      heart.style.transform = 'translateY(-60px)';
      heart.style.opacity = '0';
      setTimeout(() => heart.remove(), 700);
    }, 10);
  });

  // Initialize Game 1
  resetGame1();
  renderGame1();
  // Game 2 will render when tab is clicked
</script>
</body>
</html>
