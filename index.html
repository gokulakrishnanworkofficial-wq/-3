<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>💕 Romantic Journey for My Love 💕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* PREVENT TEXT SELECTION - fully unselectable */
      user-select: none !important;
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      -webkit-tap-highlight-color: transparent;
    }

    /* Prevent any text selection on all elements */
    html, body, div, p, span, h1, h2, h3, button, .letter-content, .love-message {
      user-select: none !important;
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, sans-serif;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Floating hearts background */
    body::before {
      content: "❤️💖💕💗💓💘💝";
      position: fixed;
      font-size: 35px;
      white-space: nowrap;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.15;
      animation: floatHearts 25s linear infinite;
      z-index: 0;
    }

    @keyframes floatHearts {
      0% { transform: translateY(0%) rotate(0deg); }
      100% { transform: translateY(-100%) rotate(15deg); }
    }

    /* Game selector tabs - now with 4 tabs */
    .game-tabs {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      z-index: 2;
      position: relative;
    }

    .tab-btn {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border: none;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: bold;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      color: #a13e4a;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      font-family: inherit;
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    .tab-btn.active {
      background: #ff6b6b;
      color: white;
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(255,107,107,0.4);
    }

    .tab-btn:hover {
      transform: translateY(-3px);
    }

    .tab-btn.completed {
      background: linear-gradient(135deg, #4caf50, #45a049);
      color: white;
      position: relative;
    }

    .tab-btn.completed::after {
      content: "✓";
      position: absolute;
      top: -8px;
      right: -8px;
      background: gold;
      color: #333;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    /* Main container */
    .game-container {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-radius: 64px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem;
      text-align: center;
      transition: all 0.4s ease;
      z-index: 2;
      position: relative;
      min-height: 550px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 2.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c31432, #ff6a88);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.3rem;
      pointer-events: none;
    }

    .sub {
      color: #b45c6b;
      font-weight: 500;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    /* Game 1 Styles */
    .question-card {
      background: white;
      border-radius: 48px;
      padding: 2rem 1.5rem;
      margin: 1rem 0;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.1);
    }

    .question-text {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2d1b2e;
      line-height: 1.3;
      margin-bottom: 1.8rem;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .btn {
      font-size: 1.6rem;
      font-weight: bold;
      padding: 12px 32px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
      box-shadow: 0 5px 0 #b0a09c;
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    .btn-yes {
      background: #ff6b6b;
      color: white;
      box-shadow: 0 5px 0 #a13e3e;
    }

    .btn-yes:hover {
      background: #ff5252;
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #a13e3e;
    }

    .btn-no {
      background: #cdd1d9;
      color: #3a2c2f;
      box-shadow: 0 5px 0 #8e8e8e;
    }

    .progress-area {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #ac4e5e;
    }

    .progress-bar-bg {
      background: #ffe0e0;
      border-radius: 30px;
      height: 8px;
      width: 100%;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      background: #ff5e7c;
      width: 0%;
      height: 100%;
      transition: width 0.3s ease;
    }

    /* Game 2 Styles */
    .love-game-box {
      padding: 20px;
    }

    .big-love-question {
      font-size: 2.5rem;
      font-weight: bold;
      color: #c23b4b;
      margin: 30px 0;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .love-buttons {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 40px 0;
      flex-wrap: wrap;
      position: relative;
      min-height: 120px;
    }

    .love-btn {
      font-size: 2rem;
      padding: 15px 40px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: bold;
      font-family: inherit;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    .love-yes {
      background: #ff6b6b;
      color: white;
      position: relative;
    }

    .love-yes:hover {
      transform: scale(1.08);
      background: #ff5252;
    }

    .love-no {
      background: #9e9e9e;
      color: white;
      position: relative;
      transition: all 0.1s ease;
    }

    .love-message {
      background: linear-gradient(135deg, #fff5f5, #ffe0e7);
      border-radius: 40px;
      padding: 25px;
      margin-top: 30px;
      font-size: 1.3rem;
      border-left: 8px solid #ff496e;
      animation: fadeIn 0.6s;
    }

    /* Letter Styles */
    .letter-container {
      background: #fffef7;
      border-radius: 30px;
      padding: 30px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      border: 1px solid #ffe0e0;
      position: relative;
      animation: letterAppear 0.8s ease;
    }

    @keyframes letterAppear {
      from {
        opacity: 0;
        transform: translateY(30px) rotate(-2deg);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotate(0);
      }
    }

    .letter-header {
      font-size: 2rem;
      margin-bottom: 20px;
      border-bottom: 3px solid #ff6b6b;
      display: inline-block;
      padding-bottom: 10px;
    }

    .letter-content {
      text-align: left;
      line-height: 1.8;
      color: #4a2a2a;
      font-size: 1.05rem;
    }

    .letter-content p {
      margin: 20px 0;
    }

    .letter-signature {
      margin-top: 30px;
      text-align: right;
      font-style: italic;
      font-size: 1.1rem;
      color: #ff6b6b;
      border-top: 2px dashed #ffd0d0;
      padding-top: 20px;
    }

    /* Memory Gallery Styles */
    .memory-gallery {
      padding: 15px 0;
    }
    
    .gallery-intro {
      font-size: 1rem;
      color: #c23b4b;
      margin-bottom: 20px;
      font-weight: 500;
    }
    
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 25px 0;
    }
    
    .memory-card {
      background: white;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 12px 25px rgba(0,0,0,0.15);
      transition: transform 0.3s ease, box-shadow 0.3s;
      cursor: pointer;
    }
    
    .memory-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 35px rgba(0,0,0,0.2);
    }
    
    .memory-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    }
    
    .memory-caption {
      padding: 12px 10px;
      font-weight: 600;
      color: #a13e4a;
      background: #fff9f9;
      font-size: 0.85rem;
      text-align: center;
      border-top: 1px solid #ffe0e0;
    }
    
    .gallery-note {
      background: #ffefef;
      border-radius: 40px;
      padding: 12px;
      font-size: 0.8rem;
      color: #b85c6b;
      margin-top: 20px;
    }
    
    /* Music Player Styles */
    .music-player {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 50px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      z-index: 1000;
      border: 1px solid rgba(255,107,107,0.3);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .music-player:hover {
      transform: scale(1.02);
    }
    
    .music-icon {
      font-size: 24px;
      animation: musicPulse 1.5s infinite;
    }
    
    @keyframes musicPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    
    .music-info {
      font-size: 12px;
      font-weight: 600;
      color: #c23b4b;
    }
    
    .music-control {
      background: #ff6b6b;
      border: none;
      border-radius: 30px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      font-family: inherit;
    }
    
    .music-control:hover {
      background: #ff5252;
      transform: scale(0.95);
    }
    
    .floating-envelope {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 40px;
      cursor: pointer;
      animation: envelopeFloat 2s ease infinite;
      z-index: 999;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
      padding: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      user-select: none !important;
    }

    .floating-envelope:hover {
      transform: scale(1.1);
    }

    @keyframes envelopeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .restart-btn {
      background: #3c2a2f;
      color: #ffe3e3;
      font-size: 1rem;
      padding: 10px 24px;
      border: none;
      border-radius: 40px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      user-select: none !important;
    }

    .restart-btn:hover {
      background: #5e3a42;
    }

    .grand-finale {
      background: linear-gradient(135deg, #ffd89b, #c31432);
      border-radius: 40px;
      padding: 30px;
      margin-top: 20px;
      animation: grandEntrance 1s ease;
    }

    @keyframes grandEntrance {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    footer {
      margin-top: 25px;
      font-size: 0.75rem;
      color: #b45c6b;
    }

    .hidden {
      display: none;
    }

    .auto-next-message {
      background: rgba(255, 107, 107, 0.2);
      border-radius: 30px;
      padding: 10px;
      margin-top: 15px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Disable text selection on all interactive elements */
    button, .btn, .love-btn, .tab-btn, .restart-btn, .floating-envelope, .memory-card, .music-player {
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    /* Protect all text containers */
    .game-container, .letter-content, .love-message, .question-text, 
    .progress-area, .sub, footer, .romantic-message, .finale-box,
    .letter-container, .letter-header, .letter-signature, p, span, div {
      user-select: none !important;
      -webkit-user-select: none !important;
    }

    img {
      user-drag: none;
      -webkit-user-drag: none;
      pointer-events: auto;
    }

    @media (max-width: 550px) {
      .game-container { padding: 1.2rem; }
      .question-text { font-size: 1.3rem; }
      .btn { font-size: 1.2rem; padding: 8px 20px; }
      .love-btn { font-size: 1.5rem; padding: 10px 25px; }
      .big-love-question { font-size: 1.8rem; }
      .tab-btn { padding: 6px 12px; font-size: 0.75rem; }
      .letter-content { font-size: 0.95rem; }
      .photo-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
      .music-player { bottom: 12px; left: 12px; padding: 6px 12px; }
      .music-info { font-size: 10px; }
      .music-icon { font-size: 20px; }
    }
  </style>
</head>
<body>

<div style="max-width: 800px; margin: 0 auto;">
  <div class="game-tabs">
    <button class="tab-btn active" id="tabGame1">💕 Romantic Q&A</button>
    <button class="tab-btn" id="tabGame2">💘 Do You Love Me?</button>
    <button class="tab-btn" id="tabGame3">📖 Letter For You 💌</button>
    <button class="tab-btn" id="tabGame4">📸 Memory Pics 🖼️</button>
  </div>

  <div class="game-container">
    <!-- Game 1: Romantic Yes/No Questions -->
    <div id="game1Content">
      <h1>✨ LOVE QUEST ✨</h1>
      <div class="sub">💌 answer with your heart 💌</div>
      <div id="game1UI"></div>
    </div>

    <!-- Game 2: Do You Love Me? -->
    <div id="game2Content" class="hidden">
      <h1>💗 DO YOU LOVE ME? 💗</h1>
      <div class="sub">🎀 there's only one right answer... 🎀</div>
      <div id="game2UI"></div>
    </div>

    <!-- Game 3: Letter For You -->
    <div id="game3Content" class="hidden">
      <h1>📖 A LETTER FOR YOU 💌</h1>
      <div class="sub">✨ words from the heart ✨</div>
      <div id="game3UI"></div>
    </div>
    
    <!-- Memory Pics Gallery -->
    <div id="game4Content" class="hidden">
      <h1>📸 OUR PRECIOUS MEMORIES 🖼️</h1>
      <div class="sub">💞 every picture tells our love story 💞</div>
      <div id="game4UI"></div>
    </div>
    <footer>❤️ made with infinite love for you ❤️</footer>
  </div>
</div>

<!-- Music Player -->
<div class="music-player" id="musicPlayer">
  <div class="music-icon" id="musicIcon">🎵</div>
  <div class="music-info" id="musicInfo">Romantic Melody</div>
  <button class="music-control" id="musicToggleBtn">🔊 Play</button>
</div>

<!-- Floating Envelope -->
<div class="floating-envelope" id="envelopeBtn">
  💌
</div>

<script>
  // ==================== BACKGROUND MUSIC ====================
  // 🎵 TO CHANGE THE SONG: Replace the src URL below with your own music file link
  // You can use:
  // - MP3 file from your computer (upload to a free host like file.io or use local path)
  // - Any direct MP3 URL from the internet
  // - YouTube to MP3 converted links (make sure they are direct .mp3 URLs)
  // 
  // Examples:
  // "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" (demo)
  // "music/our-song.mp3" (local file)
  // "https://your-domain.com/romantic-song.mp3" (your hosted file)
  
  const SONG_URL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"; // ← CHANGE THIS TO YOUR SONG!
  // Recommended: Use a romantic song MP3 link. You can upload your song to:
  // - Google Drive (get direct download link)
  // - Dropbox (change ?dl=0 to ?dl=1 for direct link)
  // - GitHub (raw file URL)
  // - Any MP3 hosting service
  
  let audio = null;
  let isPlaying = false;
  
  function initAudio() {
    if (audio === null) {
      audio = new Audio(SONG_URL);
      audio.loop = true;
      audio.volume = 0.5;
      
      // Handle autoplay restrictions - most browsers require user interaction first
      audio.addEventListener('canplaythrough', () => {
        console.log('Music ready');
      });
      
      audio.addEventListener('error', (e) => {
        console.error('Music error:', e);
        document.getElementById("musicInfo").innerHTML = "⚠️ Song unavailable";
      });
    }
  }
  
  function playMusic() {
    initAudio();
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById("musicToggleBtn").innerHTML = "🔇 Pause";
      document.getElementById("musicIcon").innerHTML = "🎶";
      document.getElementById("musicInfo").style.color = "#ff6b6b";
    }).catch(err => {
      console.log("Autoplay prevented - waiting for user interaction");
      // Browser blocked autoplay, show message
      document.getElementById("musicInfo").innerHTML = "Click Play to start music 🎵";
    });
  }
  
  function pauseMusic() {
    if (audio) {
      audio.pause();
      isPlaying = false;
      document.getElementById("musicToggleBtn").innerHTML = "🔊 Play";
      document.getElementById("musicIcon").innerHTML = "🎵";
      document.getElementById("musicInfo").style.color = "#c23b4b";
    }
  }
  
  function toggleMusic() {
    initAudio();
    if (isPlaying) {
      pauseMusic();
    } else {
      playMusic();
    }
  }
  
  // Setup music toggle button
  document.getElementById("musicToggleBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    toggleMusic();
  });
  
  // Try to autoplay on first user interaction (click anywhere)
  let musicStarted = false;
  function startMusicOnFirstInteraction() {
    if (!musicStarted) {
      musicStarted = true;
      playMusic();
      document.removeEventListener('click', startMusicOnFirstInteraction);
      document.removeEventListener('touchstart', startMusicOnFirstInteraction);
    }
  }
  
  // Wait for user interaction to start music (browsers require this)
  document.addEventListener('click', startMusicOnFirstInteraction);
  document.addEventListener('touchstart', startMusicOnFirstInteraction);
  
  // DISABLE ALL COPY ATTEMPTS & PROTECTION
  document.addEventListener('copy', function(e) { e.preventDefault(); return false; });
  document.addEventListener('cut', function(e) { e.preventDefault(); return false; });
  document.addEventListener('paste', function(e) { e.preventDefault(); return false; });
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
  document.addEventListener('selectstart', function(e) { e.preventDefault(); return false; });
  document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
  
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C' || e.key === 'x' || e.key === 'X' || e.key === 'v' || e.key === 'V')) {
      e.preventDefault();
      return false;
    }
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i'))) {
      e.preventDefault();
      return false;
    }
  });
  
  document.body.style.webkitUserSelect = 'none';
  document.body.style.userSelect = 'none';
  
  // Game completion status
  let game1Completed = false;
  let game2Completed = false;
  let game3Completed = false;
  let game4Completed = false;
  let autoTransitionTimeout = null;

  // ==================== GAME 1: Romantic Questions ====================
  const questions = [
    { text: "Do you believe in love at first sight?", emoji: "✨😍" },
    { text: "Do I make your heart beat faster every time I text you?", emoji: "💓📱" },
    { text: "Is hugging me your favorite feeling in the world?", emoji: "🤗💕" },
    { text: "Do you smile when you see my name pop up?", emoji: "😊📲" },
    { text: "Would you cross oceans to be with me?", emoji: "🌊❤️" },
    { text: "Do you believe we are soulmates?", emoji: "🔗💫" },
    { text: "Are you ready for the final surprise?", emoji: "🎁💖" }
  ];

  const finalMessages = {
    perfect: {
      title: "💞 YES! A THOUSAND TIMES YES! 💞",
      message: "You said YES to everything, and my heart is exploding with joy! 🌟 You are my everything, my dream, my forever.",
      gift: "🎁✨ SURPRISE! ✨🎁\nA romantic virtual date night is waiting!"
    },
    good: {
      title: "💖 My Heart Belongs to You 💖",
      message: "You lit up my world with your sweet answers. Every YES is a reminder of how magical 'us' really is.",
      gift: "🎁 A little surprise: I've made a private playlist of 'our songs' just for you!"
    },
    sweet: {
      title: "🌹 You & Me, A Beautiful Story 🌹",
      message: "Your love shines brighter than stars. Our journey is unique, full of laughter and warmth.",
      gift: "🎁 Surprise: I'll send you a voice note every morning this week!"
    },
    always: {
      title: "💗 My Love for You is Infinite 💗",
      message: "Every answer, every moment — I treasure it all. Thank you for being you.",
      gift: "🎁 Secret unlocked: I'll be ordering your favorite treat delivered to you!"
    }
  };

  let currentIndex = 0;
  let totalYesCount = 0;
  let game1Finished = false;

  // ==================== Helper Functions ====================
  function triggerMiniConfetti() {
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '9999';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    for(let i = 0; i < 100; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 7 + 3,
        color: `hsl(${Math.random() * 60 + 340}, 80%, 65%)`,
        vy: Math.random() * 3 + 1,
        vx: (Math.random() - 0.5) * 2
      });
    }
    function draw() {
      if(!canvas.parentNode) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let active = false;
      for(let p of particles) {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
        ctx.fill();
        p.y += p.vy;
        p.x += p.vx;
        if(p.y < canvas.height + 100) active = true;
      }
      if(active) requestAnimationFrame(draw);
      else canvas.remove();
    }
    draw();
    setTimeout(() => { if(canvas.parentNode) canvas.remove(); }, 2500);
  }

  function triggerHeavyConfetti() {
    for (let i = 0; i < 5; i++) {
